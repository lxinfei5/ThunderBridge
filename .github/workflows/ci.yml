name: ci
on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.8", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Compile (no third-party deps)
        run: python -m compileall gateway scripts
      - name: Offline self-test
        run: python gateway/test_proxy.py
      - name: Doctor (config validation, skip nested test)
        run: python scripts/doctor.py --no-test --ci
